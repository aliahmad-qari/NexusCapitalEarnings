<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#070b14"/>
  <!-- Gradient def -->
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00e6a0"/>
      <stop offset="100%" stop-color="#00b8d9"/>
    </linearGradient>
  </defs>
  <!-- Dollar sign -->
  <text x="256" y="340" font-family="Arial Black, sans-serif" font-size="280" font-weight="900"
        text-anchor="middle" fill="url(#g)">$</text>
  <!-- Bottom text -->
  <text x="256" y="460" font-family="Arial, sans-serif" font-size="52" font-weight="700"
        text-anchor="middle" fill="#ffffff" opacity="0.7">NEXUS</text>
</svg>
