services:
  - type: web
    name: nexuscapital-backend
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npx tsx server.ts
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: MONGODB_URI
        sync: false   # set this in Render dashboard → Environment → Secret
      - key: JWT_SECRET
        sync: false   # set this in Render dashboard → Environment → Secret
      - key: FRONTEND_URL
        value: https://nexus-capital-earnings.vercel.app
      - key: ADDITIONAL_ORIGINS
        value: https://roiwealth.vercel.app
      - key: REFERRAL_REWARD_PKR
        value: "85"
